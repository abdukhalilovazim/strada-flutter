name: Build APK and Send to Telegram

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  code-build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout
      - name: Checkout project
        uses: actions/checkout@v4

      # ✅ Setup Flutter with cache
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # ✅ Setup Java with Gradle cache
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17" # Flutter 3.x works well with Java 17
          cache: gradle

      # ✅ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # ✅ Generate Code (Injectable, etc.)
      - name: Code Generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # ✅ Build Release APK (Faqat arm64-v8a — Buildni tezlashtirish uchun)
      - name: Build Release APK
        run: flutter build apk --release --target-platform android-arm64 --no-pub

      # ✅ Telegram uchun APK (High-speed build)
      - name: Send APK to Telegram
        if: ${{ success() }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          document: build/app/outputs/flutter-apk/app-release.apk
          message: |
            ✅ *Pizza Strada Build Successful*
            📲 Version: `arm64-v8a` (Dev Mode)
            👤 User: ${{ github.actor }}
            🌿 Branch: `${{ github.head_ref || github.ref_name }}`

      # ❌ Failure notification
      - name: Send Error Notification
        if: ${{ failure() }}
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            ❌ *Pizza Strada Build Failed*
            
            👤 User: ${{ github.actor }}
            🌿 Branch: `${{ github.head_ref || github.ref_name }}`
            📝 Commit: ${{ github.event.head_commit.message || github.event.pull_request.title }}
            📦 Repo: ${{ github.repository }}
