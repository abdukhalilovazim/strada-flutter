name: pizza_strada
description: PizzaStrada Food Delivery App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # DI
  get_it: ^8.0.2
  injectable: ^2.4.4

  # GraphQL
  graphql_flutter: ^5.2.0-beta.7

  # Navigation
  go_router: ^14.6.2

  # Localization
  easy_localization: ^3.0.7

  # Maps & Geo
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Images
  cached_network_image: ^3.4.1

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6

  # Utils
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.5 # HMAC-SHA256 uchun
  device_info_plus: ^11.1.1
  package_info_plus: ^8.1.2
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  google_fonts: ^6.2.1 # Inter font
  url_launcher: ^6.3.1 # tel: link
  dartz: ^0.10.1 # Either<Failure, T>
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
    - lib/l10n/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/logo.png"
